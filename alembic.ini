# alembic.ini — Alembic configuration for ADP project

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Use DATABASE_URL env var. Set in .env file.
# Sync URL (psycopg2) for migrations only.
# App uses asyncpg (postgresql+asyncpg://...)
sqlalchemy.url = %(DATABASE_URL)s

[post_write_hooks]
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
